<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Girma Biru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    /* Subtle animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(16, 185, 129, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #10b981);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
      flex-shrink: 0;
    }

    .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .bio {
      font-size: 0.95rem;
      color: #a0a0a0;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      margin: 0.25rem 0;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.25rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.18s ease, transform 0.15s ease, border-color 0.18s ease;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      color: #555;
      font-size: 1rem;
      transition: color 0.15s;
    }

    .link-btn:hover .link-arrow {
      color: #aaa;
    }

    /* Individual icon colors */
    .icon-linkedin  { background: rgba(10, 102, 194, 0.25); }
    .icon-twitter   { background: rgba(29, 161, 242, 0.2); }
    .icon-instagram { background: rgba(225, 48, 108, 0.2); }
    .icon-youtube   { background: rgba(255, 0, 0, 0.2); }
    .icon-github    { background: rgba(255, 255, 255, 0.1); }
    .icon-email     { background: rgba(99, 102, 241, 0.2); }
    .icon-website   { background: rgba(16, 185, 129, 0.2); }
    .icon-tiktok    { background: rgba(255, 255, 255, 0.07); }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">

    <div class="avatar">GB</div>

    <h1 class="name">Girma Biru</h1>
    <p class="bio"><!-- Add a short tagline or description here --></p>

    <div class="divider"></div>

    <nav class="links" aria-label="Links">

      <!-- ============================================================
           EDIT THE LINKS BELOW
           Replace each href="#" with the real URL.
           Delete any rows you don't need, or copy a row to add more.
           ============================================================ -->

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-linkedin">💼</span>
        <span class="link-label">LinkedIn</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-twitter">🐦</span>
        <span class="link-label">Twitter / X</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-instagram">📸</span>
        <span class="link-label">Instagram</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-youtube">▶️</span>
        <span class="link-label">YouTube</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-tiktok">🎵</span>
        <span class="link-label">TikTok</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-github">🐙</span>
        <span class="link-label">GitHub</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-email">✉️</span>
        <span class="link-label">Email Me</span>
        <span class="link-arrow">›</span>
      </a>

      <a class="link-btn" href="#" target="_blank" rel="noopener noreferrer">
        <span class="link-icon icon-website">🌐</span>
        <span class="link-label">Website</span>
        <span class="link-arrow">›</span>
      </a>

    </nav>

    <footer>© 2026 Girma Biru</footer>

  </main>
</body>
</html>
