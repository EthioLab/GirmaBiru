<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Girma Biru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(16, 185, 129, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #10b981);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
      flex-shrink: 0;
    }

    .name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .bio {
      font-size: 0.95rem;
      color: #a0a0a0;
      text-align: center;
      max-width: 340px;
      line-height: 1.5;
      min-height: 0;
    }

    .divider {
      width: 40px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      margin: 0.25rem 0;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.25rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #f0f0f0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.18s ease, transform 0.15s ease, border-color 0.18s ease;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    .link-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .link-label { flex: 1; }

    .link-arrow { color: #555; font-size: 1rem; transition: color 0.15s; }
    .link-btn:hover .link-arrow { color: #aaa; }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }

    footer a {
      color: #555;
      text-decoration: none;
      margin-left: 0.75rem;
    }

    footer a:hover { color: #888; }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">GB</div>
    <h1 class="name">Girma Biru</h1>
    <p class="bio" id="bio-text"></p>
    <div class="divider"></div>
    <nav class="links" id="links-container" aria-label="Links"></nav>
    <footer>
      © 2026 Girma Biru
      <a href="admin.html">&#x2699;</a>
    </footer>
  </main>

  <script>
    const DEFAULT_LINKS = [
      { id: 'linkedin',  label: 'LinkedIn',    icon: '💼', bg: 'rgba(10,102,194,0.25)',  url: '', visible: true },
      { id: 'twitter',   label: 'Twitter / X', icon: '🐦', bg: 'rgba(29,161,242,0.2)',   url: '', visible: true },
      { id: 'instagram', label: 'Instagram',   icon: '📸', bg: 'rgba(225,48,108,0.2)',   url: '', visible: true },
      { id: 'youtube',   label: 'YouTube',     icon: '▶️', bg: 'rgba(255,0,0,0.2)',      url: '', visible: true },
      { id: 'tiktok',    label: 'TikTok',      icon: '🎵', bg: 'rgba(255,255,255,0.07)', url: '', visible: true },
      { id: 'github',    label: 'GitHub',      icon: '🐙', bg: 'rgba(255,255,255,0.1)',  url: '', visible: true },
      { id: 'email',     label: 'Email Me',    icon: '✉️', bg: 'rgba(99,102,241,0.2)',   url: '', visible: true },
      { id: 'website',   label: 'Website',     icon: '🌐', bg: 'rgba(16,185,129,0.2)',   url: '', visible: true },
    ];

    const stored = localStorage.getItem('gb_links');
    const links  = stored ? JSON.parse(stored) : DEFAULT_LINKS;

    const storedBio = localStorage.getItem('gb_bio');
    if (storedBio) document.getElementById('bio-text').textContent = storedBio;

    const container = document.getElementById('links-container');
    links.filter(l => l.visible).forEach(link => {
      const href = link.url || '#';
      const a = document.createElement('a');
      a.className = 'link-btn';
      a.href = href;
      if (href !== '#') { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
      a.innerHTML = `
        <span class="link-icon" style="background:${link.bg}">${link.icon}</span>
        <span class="link-label">${link.label}</span>
        <span class="link-arrow">›</span>
      `;
      container.appendChild(a);
    });
  </script>
</body>
</html>
